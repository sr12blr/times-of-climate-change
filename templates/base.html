<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Times of Climate Change{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1><a href="{{ root_path }}">The Times of Climate Change</a></h1>
            <p class="site-tagline">One climate story that matters, every day</p>
            <nav class="header-nav">
                <a href="{{ root_path }}">Today</a>
                <a href="{{ root_path }}explore/">Explore</a>
                <a href="{{ root_path }}archive/">Archive</a>
                <a href="{{ root_path }}about/">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            The Times of Climate Change
        </footer>
    </div>
</body>
</html>
