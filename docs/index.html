    <script>
    (function() {
        var btn = document.getElementById('burgerBtn');
        var menu = document.getElementById('burgerMenu');
        var close = document.getElementById('burgerClose');
        var overlay = document.getElementById('burgerOverlay');
        if (!btn) return;
        function open() { menu.classList.add('open'); overlay.classList.add('open'); }
        function shut() { menu.classList.remove('open'); overlay.classList.remove('open'); }
        btn.addEventListener('click', open);
        close.addEventListener('click', shut);
        overlay.addEventListener('click', shut);
    })();
    </script>
