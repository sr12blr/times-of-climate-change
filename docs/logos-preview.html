<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ToCC Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { background: #f5f5f5; font-family: 'Nunito Sans', sans-serif; padding: 60px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
  .circle-preview { width: 400px; height: 400px; border-radius: 50%; overflow: hidden; border: 2px solid #D4D4CE; }
  .circle-preview svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="circle-preview">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="100" fill="#F8F8F6"/>
    <!-- "T" in dark -->
    <text x="52" y="118" text-anchor="middle" fill="#1A1A18" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700">T</text>
    <!-- "o" smaller -->
    <text x="80" y="118" text-anchor="middle" fill="#1A1A18" font-family="'Playfair Display', Georgia, serif" font-size="42" font-weight="400">o</text>
    <!-- "CC" in alert orange-red -->
    <text x="138" y="118" text-anchor="middle" fill="#D4380D" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700" font-style="italic">CC</text>
    <!-- Thin teal line -->
    <line x1="30" y1="132" x2="170" y2="132" stroke="#0E7C7B" stroke-width="1.5"/>
    <!-- Full name -->
    <text x="100" y="150" text-anchor="middle" fill="#3A3A36" font-family="'Nunito Sans', sans-serif" font-size="8" letter-spacing="1.5">THE TIMES OF CLIMATE CHANGE</text>
  </svg>
</div>

</body>
</html>
