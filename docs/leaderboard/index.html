<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard QR — Torchlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../leaderboard/_shared.css">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
<div class="lb-wrap">
  <h1 class="lb-title">🔦 Torchlight Leaderboard</h1>
  <p class="lb-sub">Pick a round, project this QR, let players scan.</p>

  <div class="lb-card">
    <div class="lb-row" style="margin-bottom:16px">
      <label for="puzzlePick" style="font-weight:700">Round:</label>
      <select id="puzzlePick" class="lb-select"></select>
      <span class="lb-spacer"></span>
      <a class="lb-btn lb-btn-secondary" id="resultsLink" href="#">View leaderboard →</a>
    </div>
    <div id="qrcode"></div>
    <div class="lb-url" id="urlDisplay"></div>
  </div>

  <p class="lb-sub" style="text-align:center">Event id: <code id="eventId"></code></p>
</div>

<script>
(function() {
  var cfg = window.LB_CONFIG;
  if (!cfg) { document.body.innerHTML = '<p style="padding:40px;text-align:center">LB_CONFIG missing — see SETUP.md</p>'; return; }
  document.getElementById('eventId').textContent = cfg.eventId;

  var pick = document.getElementById('puzzlePick');
  cfg.puzzles.forEach(function(date, i) {
    var opt = document.createElement('option');
    opt.value = date;
    opt.textContent = 'Round ' + (i+1) + ' — ' + date;
    pick.appendChild(opt);
  });

  function render() {
    var date = pick.value;
    var url = location.origin + location.pathname.replace(/[^/]*$/, '') + 'r/?p=' + encodeURIComponent(date);
    document.getElementById('urlDisplay').textContent = url;
    document.getElementById('resultsLink').href = 'results/?p=' + encodeURIComponent(date);
    var box = document.getElementById('qrcode');
    box.innerHTML = '';
    try {
      var qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      // cellSize=8 → ~ 240-280px QR; margin in cells
      box.innerHTML = qr.createSvgTag({ cellSize: 8, margin: 2, scalable: true });
      var svg = box.querySelector('svg');
      if (svg) { svg.style.width = '320px'; svg.style.height = '320px'; }
    } catch (e) {
      box.textContent = 'QR error: ' + e.message;
    }
  }
  pick.addEventListener('change', render);
  render();
})();
</script>
</body>
</html>
