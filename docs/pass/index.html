<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css?v=1774383087">
</head>
<body>
    
    <!-- Burger menu -->
    <button class="burger-btn" id="burgerBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
    </button>
    <nav class="burger-menu" id="burgerMenu">
        <button class="burger-close" id="burgerClose" aria-label="Close menu">&times;</button>
        <a href="../today/">Today's Story</a>
        <a href="../archive/">Archive</a>
        <a href="../explore/">Getting Real</a>
        <a href="../about/">About</a>
    </nav>
    <div class="burger-overlay" id="burgerOverlay"></div>

    <header class="site-masthead">
        <div class="container">
            <h1 class="masthead-title"><a href="../">The Times of <em>Climate Change</em></a></h1>
            <p class="masthead-subtitle">One climate story that affects India, every day</p>
        </div>
    </header>
    

    <div class="container">
        
<div class="pass-page">
    <p class="pass-message">Maybe today is not the day.<br>Issokay. You know where to find us when you are ready!</p>
    <a href="../" class="pass-home">← Back home</a>
</div>

    </div>

    
    <footer class="site-footer">
        <div class="container">
            <span class="footer-title">The Times of Climate Change</span>
            <span class="footer-tagline">One climate story, every day</span>
        </div>
    </footer>
    

    <script>
    (function() {
        var btn = document.getElementById('burgerBtn');
        var menu = document.getElementById('burgerMenu');
        var close = document.getElementById('burgerClose');
        var overlay = document.getElementById('burgerOverlay');
        if (!btn) return;
        function open() { menu.classList.add('open'); overlay.classList.add('open'); }
        function shut() { menu.classList.remove('open'); overlay.classList.remove('open'); }
        btn.addEventListener('click', open);
        close.addEventListener('click', shut);
        overlay.addEventListener('click', shut);
    })();
    </script>
</body>
</html>
